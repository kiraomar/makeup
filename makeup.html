<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مكياج | Makeup by Asoo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lemonada:wght@500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { brand: { light: '#ffe4e6', DEFAULT: '#fb7185', dark: '#e11d48' } }, fontFamily: { 'cairo': ['Cairo', 'sans-serif'], 'lemonada': ['Lemonada', 'cursive'], 'dancing': ['Dancing Script', 'cursive'] } } } }</script>
    <style> html, body { overflow-x: hidden; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; background: linear-gradient(-45deg, #fff1f2, #ffe4e6, #fce7f3, #fdf2f8); font-family: 'Cairo', sans-serif; min-height: 100vh; display: flex; flex-direction: column;} .fade-in { animation: fadeIn 0.5s ease forwards; opacity: 0; } @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } } img, video { -webkit-user-drag: none; pointer-events: none; } .image-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 4px 15px rgba(251, 113, 133, 0.1); cursor: pointer; position: relative; overflow: hidden; } .image-card:active { transform: scale(0.97); } .watermark { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 10; } .watermark span { color: rgba(255, 255, 255, 0.6); font-size: 2.5rem; font-family: 'Dancing Script', cursive; transform: rotate(-35deg); text-shadow: 1px 1px 3px rgba(0,0,0,0.3); } .loader { border: 4px solid #f3f3f3; border-top: 4px solid #fb7185; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; } @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } #media-viewer { transition: opacity 0.3s ease; opacity: 0; pointer-events: none; } #media-viewer.show { opacity: 1; pointer-events: auto; } .locked-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; } </style>
</head>
<body class="text-gray-800 relative pb-20">
    <div class="w-full max-w-md mx-auto relative z-10 px-4 py-6">
        <a href="index.html" class="inline-flex items-center gap-2 text-brand-dark font-bold mb-4 bg-white/70 backdrop-blur px-4 py-2 rounded-full shadow-sm"><i class="fa-solid fa-arrow-right"></i> العودة للرئيسية</a>
        <div class="text-center mb-6 fade-in"><div class="w-20 h-20 bg-brand-light text-brand rounded-full flex items-center justify-center shadow-inner mx-auto mb-3 text-3xl"><i class="fa-solid fa-paintbrush"></i></div><h1 class="text-2xl font-bold font-lemonada text-gray-900">مكياج</h1><p class="text-xs text-brand font-bold mt-1">الصور والفيديوهات تُعرض لمرة واحدة فقط للخصوصية 🔒</p></div>
        <div id="data-container" class="grid grid-cols-2 gap-3 w-full"><div class="col-span-2 text-center py-10"><div class="loader"></div></div></div>
    </div>

    <!-- عارض الميديا بملء الشاشة -->
    <div id="media-viewer" class="fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center">
        <button onclick="closeViewer()" class="absolute top-6 right-6 text-white bg-white/20 hover:bg-white/40 w-10 h-10 rounded-full flex items-center justify-center text-xl transition z-50"><i class="fa-solid fa-xmark"></i></button>
        <div class="relative w-full max-w-md px-4 flex justify-center items-center h-[70vh]">
            <img id="viewer-img" src="" class="w-full rounded-2xl object-contain max-h-full shadow-2xl hidden">
            <video id="viewer-vid" src="" class="w-full rounded-2xl object-contain max-h-full shadow-2xl hidden" playsinline controls controlsList="nodownload"></video>
            <div class="watermark" style="font-size: 2rem;"><span>ASOO</span></div>
        </div>
        <div class="mt-4 text-center px-4 w-full max-w-md"><h3 id="viewer-title" class="text-white font-bold font-cairo text-xl mb-2"></h3><span id="viewer-price" class="text-brand font-black text-2xl bg-white/10 px-4 py-2 rounded-xl border border-white/20 inline-block"></span></div>
    </div>

    <script>
        document.addEventListener('copy', e => e.preventDefault()); document.addEventListener('contextmenu', e => e.preventDefault());
        
        // جلب معرفات الصور التي تمت مشاهدتها من ذاكرة الهاتف
        let viewedItems = JSON.parse(localStorage.getItem('viewed_asoo_makeup')) || [];

        async function loadCategory() {
            const container = document.getElementById('data-container');
            try {
                const res = await fetch('./data.json?t=' + Date.now()); const data = await res.json();
                const items = data.items['makeup'] || [];
                if(items.length === 0) { container.innerHTML = '<p class="col-span-2 text-center py-10 font-bold text-gray-500">سيتم إضافة المحتوى قريباً 🌸</p>'; return; }
                
                container.innerHTML = items.map((item, i) => {
                    const isViewed = viewedItems.includes(item.id.toString());
                    const typeIcon = item.type === 'video' ? '<i class="fa-solid fa-play absolute top-2 right-2 text-white bg-black/50 p-2 rounded-full text-xs z-10"></i>' : '';
                    const mediaElement = item.type === 'video' 
                        ? `<video src="${item.image}#t=0.1" class="w-full h-full object-cover" preload="metadata"></video>` 
                        : `<img src="${item.image}" class="w-full h-full object-cover">`;
                    
                    const lockedOverlay = isViewed ? `<div class="locked-overlay"><i class="fa-solid fa-lock text-3xl mb-2 text-pink-400"></i><span class="text-xs font-bold">تمت المشاهدة</span></div>` : '';
                    const onClickAction = isViewed ? '' : `onclick="openViewer('${item.id}', '${item.image}', '${item.name}', '${item.price}', '${item.type || 'image'}')"`;

                    return `
                    <div ${onClickAction} id="card-${item.id}" class="image-card rounded-2xl p-2 flex flex-col items-center text-center fade-in ${isViewed ? 'opacity-80' : ''}" style="animation-delay: ${i * 0.1}s;">
                        <div class="relative w-full aspect-square rounded-xl overflow-hidden mb-2 bg-pink-50">
                            ${typeIcon} ${mediaElement} ${lockedOverlay}
                            <div class="watermark"><span>ASOO</span></div>
                        </div>
                        <h3 class="font-bold text-gray-800 text-sm mb-1 font-cairo leading-tight">${item.name}</h3><span class="text-brand-dark font-black text-sm bg-brand-light/50 px-2 py-1 rounded-lg w-full">${item.price} د.ع</span>
                    </div>`;
                }).join('');
            } catch (e) { container.innerHTML = '<p class="col-span-2 text-center py-10 font-bold text-gray-500">خطأ في التحميل</p>'; }
        }
        
        // --- نظام العارض مع حل الرجوع والخصوصية ---
        const viewer = document.getElementById('media-viewer');
        const vImg = document.getElementById('viewer-img');
        const vVid = document.getElementById('viewer-vid');
        let currentOpenId = null;

        function openViewer(id, src, title, price, type) {
            currentOpenId = id;
            document.getElementById('viewer-title').textContent = title;
            document.getElementById('viewer-price').textContent = price + ' د.ع';
            
            if(type === 'video') { vImg.classList.add('hidden'); vVid.src = src; vVid.classList.remove('hidden'); vVid.play(); } 
            else { vVid.classList.add('hidden'); vImg.src = src; vImg.classList.remove('hidden'); }
            
            window.location.hash = 'view';
        }

        window.addEventListener('hashchange', () => {
            if(window.location.hash === '#view') { 
                viewer.classList.add('show'); document.body.style.overflow = 'hidden'; 
            } else { 
                // عند إغلاق الصورة (سواء بزر الإغلاق أو رجوع الهاتف) يتم قفلها فوراً
                viewer.classList.remove('show'); document.body.style.overflow = 'auto';
                if(vVid) vVid.pause();
                
                // تطبيق الخصوصية (العرض لمرة واحدة)
                if(currentOpenId && !viewedItems.includes(currentOpenId)) {
                    viewedItems.push(currentOpenId);
                    localStorage.setItem('viewed_asoo_makeup', JSON.stringify(viewedItems));
                    
                    // تحديث شكل الكرت في الواجهة فوراً ليظهر القفل
                    const card = document.getElementById('card-' + currentOpenId);
                    if(card) {
                        card.onclick = null; // تعطيل الضغط
                        card.classList.add('opacity-80');
                        const imgContainer = card.querySelector('.relative');
                        imgContainer.innerHTML += `<div class="locked-overlay"><i class="fa-solid fa-lock text-3xl mb-2 text-pink-400"></i><span class="text-xs font-bold">تمت المشاهدة</span></div>`;
                    }
                    currentOpenId = null;
                }
            }
        });
        function closeViewer() { window.history.back(); }
        window.addEventListener('DOMContentLoaded', loadCategory);
    </script>
</body>
</html>
