<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>مكياج | Makeup by Asoo</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Lemonada:wght@600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root{--brand:#fb7185;} body{margin:0; font-family:'Cairo',sans-serif; background:#fdf2f8;} 
    .header{text-align:center; padding:20px;} 
    .card{background:white; border-radius:15px; margin:10px; padding:10px; box-shadow:0 4px 10px rgba(0,0,0,0.05); text-align:center; cursor:pointer; -webkit-tap-highlight-color: transparent;} 
    .card:active{transform:scale(0.98);}
    
    .media-box { position:relative; width:100%; height:220px; border-radius:10px; overflow:hidden; background:#1f2937; display:flex; align-items:center; justify-content:center;} 
    .media{width:100%; height:100%; object-fit:cover;} 
    .video-thumb { color: white; font-size: 3rem; }
    
    .price{color:#e11d48; font-weight:bold; background:#ffe4e6; padding:5px; border-radius:8px; display:block; margin-top:10px;} 
    .back{background:white; padding:10px 20px; display:inline-block; border-radius:20px; margin:15px; color:#e11d48; text-decoration:none; font-weight:bold; box-shadow:0 2px 5px rgba(0,0,0,0.05);} 
    
    .watermark { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; z-index:10; }
    .watermark span { color:rgba(255,255,255,0.6); font-size:3rem; font-family:'Dancing Script',cursive; transform:rotate(-35deg); text-shadow:2px 2px 4px rgba(0,0,0,0.4); }
    
    #viewer{position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:100; display:none; flex-direction:column; align-items:center; justify-content:center;} 
    #viewer.show{display:flex;} 
    .v-media-box { position:relative; width:100%; max-width:400px; display:flex; justify-content:center; align-items:center;}
    .v-media{max-width:100%; max-height:75vh; border-radius:15px; object-fit:contain; box-shadow:0 10px 20px rgba(0,0,0,0.5);} 
    #viewer .watermark span { font-size:4.5rem; }
    
    .locked{opacity:0.6; pointer-events:none;} 
    .lock-icon{position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; background:rgba(0,0,0,0.6); z-index:20; font-size:2.5rem; backdrop-filter:blur(3px);} 
    
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--brand); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; } 
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } 
</style>
</head><body>
    <a href="index.html" class="back"><i class="fa-solid fa-arrow-right"></i> العودة</a>
    <div class="header">
        <div style="font-size:3.5rem; background:#ffe4e6; width:80px; height:80px; margin:0 auto 10px; border-radius:50%; display:flex; align-items:center; justify-content:center;">❤️</div>
        <h1 style="font-family:'Lemonada',cursive; color:#1f2937; margin:0;">مكياج</h1>
        <p style="color:#fb7185; font-size:0.85rem; font-weight:bold; margin-top:5px;">تُعرض الصور والفيديوهات لمرة واحدة للخصوصية 🔒</p>
    </div>
    
    <div id="grid" style="display:grid; grid-template-columns:1fr 1fr; padding:10px; max-width:500px; margin:0 auto;"><div style="grid-column:1/-1; text-align:center; padding:30px;"><div class="loader"></div></div></div>
    
    <div id="viewer">
        <button onclick="history.back()" style="position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.2); border:none; color:white; font-size:1.5rem; width:45px; height:45px; border-radius:50%; z-index:110;"><i class="fa-solid fa-xmark"></i></button>
        <div class="v-media-box">
            <!-- شاشة تحميل تظهر فقط أثناء جلب الفيديو -->
            <div id="v-loader" style="display:none; color:white; flex-direction:column; align-items:center;"><div class="loader" style="margin-bottom:10px;"></div><span style="font-family:'Cairo';">جاري تجهيز الفيديو...</span></div>
            <img id="v-img" class="v-media">
            <video id="v-vid" class="v-media" playsinline controls controlsList="nodownload"></video>
            <div id="v-watermark" class="watermark"><span>ASOO</span></div>
        </div>
        <h3 id="v-price" style="color:#fb7185; margin-top:20px; font-size:1.5rem; background:rgba(255,255,255,0.1); padding:8px 25px; border-radius:12px; border:1px solid rgba(255,255,255,0.2);"></h3>
    </div>
    
    <script>
        let viewed = JSON.parse(localStorage.getItem('v_asoo_makeup')) || [];
        
        fetch('./data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
            const items = d.items['makeup'] || [];
            if(!items.length) { document.getElementById('grid').innerHTML = '<p style="grid-column:1/-1; text-align:center; font-weight:bold; color:#9ca3af;">سيتم الإضافة قريباً 🌸</p>'; return; }
            
            document.getElementById('grid').innerHTML = items.map(i => {
                const isL = viewed.includes(i.id.toString());
                // استبدال محاولة تحميل الفيديو في المعاينة بمربع أسود أنيق وزر Play (يحل مشكلة تأخير الصفحة)
                const m = i.type==='video' ? `<div class="video-thumb"><i class="fa-solid fa-play"></i></div>` : `<img src="${i.image}" class="media" loading="lazy">`;
                const l = isL ? `<div class="lock-icon"><i class="fa-solid fa-lock"></i><span style="font-size:0.8rem; margin-top:5px; font-family:'Cairo';">تمت المشاهدة</span></div>` : '';
                
                return `<div id="c-${i.id}" class="card ${isL?'locked':''}" ${isL?'':`onclick="openV('${i.id}','${i.image}','${i.price}','${i.type}')"`}>
                    <div class="media-box">${m}${l}<div class="watermark" style="${i.type==='video' ? 'display:none;' : ''}"><span>ASOO</span></div></div>
                    <span class="price">${i.price} د.ع</span>
                </div>`;
            }).join('');
        });
        
        // الخدعة التي تحل مشكلة الآيفون (تحويل الفيديو إلى Blob قبل تشغيله)
        async function openV(id, src, price, type){
            document.getElementById('v-price').innerText = price+' د.ع';
            const vVid = document.getElementById('v-vid');
            const vImg = document.getElementById('v-img');
            const vLoad = document.getElementById('v-loader');
            const vWater = document.getElementById('v-watermark');
            
            document.getElementById('viewer').classList.add('show'); 
            window.location.hash='view_'+id;

            if(type==='video'){
                vImg.style.display='none'; 
                vVid.style.display='none';
                vWater.style.display='none';
                vLoad.style.display='flex'; // إظهار شاشة التحميل
                
                try {
                    // سحب الفيديو للذاكرة لكي يعمل على الآيفون إجبارياً
                    const response = await fetch(src);
                    const blob = await response.blob();
                    const blobUrl = URL.createObjectURL(blob);
                    
                    vLoad.style.display='none';
                    vVid.src = blobUrl; 
                    vVid.style.display='block';
                    vWater.style.display='flex';
                    vVid.play();
                } catch(e) {
                    vLoad.innerHTML = "فشل تحميل الفيديو. تأكدي من الانترنت.";
                }
            }
            else{
                vVid.style.display='none'; 
                vLoad.style.display='none';
                vImg.src=src; 
                vImg.style.display='block';
                vWater.style.display='flex';
            }
        }
        
        window.addEventListener('hashchange', ()=>{
            if(!window.location.hash.includes('view')){
                document.getElementById('viewer').classList.remove('show'); document.getElementById('v-vid').pause();
                const id = window.lastId;
                if(id && !viewed.includes(id)){ 
                    viewed.push(id); localStorage.setItem('v_asoo_makeup', JSON.stringify(viewed)); 
                    const card = document.getElementById('c-'+id);
                    card.classList.add('locked'); card.onclick=null;
                    card.querySelector('.media-box').innerHTML += '<div class="lock-icon"><i class="fa-solid fa-lock"></i><span style="font-size:0.8rem; margin-top:5px; font-family:\'Cairo\';">تمت المشاهدة</span></div>';
                }
            } else { window.lastId = window.location.hash.split('_')[1]; }
        });
    </script>
</body></html>
