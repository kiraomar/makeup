<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Makeup by Asoo | الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Dancing+Script:wght@700&family=Lemonada:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { brand: { light: '#ffe4e6', DEFAULT: '#fb7185', dark: '#e11d48' } }, fontFamily: { 'cairo': ['Cairo', 'sans-serif'], 'lemonada': ['Lemonada', 'cursive'], 'dancing': ['Dancing Script', 'cursive'] } } } }</script>
    <style>
        html, body { overflow-x: hidden; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
        body { background: linear-gradient(-45deg, #fff1f2, #ffe4e6, #fce7f3, #fdf2f8); background-size: 400% 400%; animation: gradientBG 15s ease infinite; font-family: 'Cairo', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 10px 25px -5px rgba(251, 113, 133, 0.15); animation: fadeIn 0.6s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .bg-makeup-icon { position: fixed; font-size: 1.8rem; opacity: 0.15; z-index: 0; pointer-events: none; animation: float-up linear infinite; }
        @keyframes float-up { 0% { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; } 10% { opacity: 0.3; } 90% { opacity: 0.3; } 100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); opacity: 0; } }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #fb7185; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 relative">
    <div class="bg-makeup-icon" style="left: 10%; animation-duration: 12s;">💄</div><div class="bg-makeup-icon" style="left: 80%; animation-duration: 15s;">💋</div><div class="bg-makeup-icon" style="left: 40%; animation-duration: 10s;">💅</div><div class="bg-makeup-icon" style="left: 70%; animation-duration: 18s;">👑</div>

    <main class="flex-grow w-full px-4 py-10 relative z-10 flex flex-col items-center">
        <header class="text-center mb-10 w-full">
            <h1 class="font-dancing text-6xl sm:text-7xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-brand-dark via-brand to-pink-500 py-2">makeup by Asoo</h1>
            <p class="mt-3 text-gray-600 text-sm font-medium">اكتشفي سحر جمالك مع خدماتنا المميزة.</p>
        </header>

        <div id="sections-container" class="flex flex-col gap-4 w-full max-w-md mx-auto pb-8">
            <div class="text-center py-10"><div class="loader"></div><p class="mt-4 text-brand font-bold text-sm">جاري تحميل الأقسام...</p></div>
        </div>
    </main>

    <footer class="py-5 text-center z-10 bg-white/40 border-t border-white/50 w-full mt-auto">
        <p class="text-gray-600 text-xs font-bold">&copy; 2026 <span class="font-dancing text-brand text-sm mx-1">makeup by Asoo</span>.</p>
    </footer>

    <script>
        document.addEventListener('copy', e => e.preventDefault()); document.addEventListener('contextmenu', e => e.preventDefault());
        
        async function loadSections() {
            const container = document.getElementById('sections-container');
            try {
                // سحب البيانات
                const res = await fetch('./data.json?t=' + Date.now());
                if(!res.ok) throw new Error();
                const data = await res.json();
                
                if(!data.sections || data.sections.length === 0) {
                    container.innerHTML = '<p class="text-center font-bold text-gray-500">لا توجد أقسام حالياً. يرجى إضافتها من لوحة التحكم.</p>';
                    return;
                }
                
                // توجيه الزبون لصفحة القسم الفعلية (مثال: makeup.html) التي تصنعها لوحة التحكم
                container.innerHTML = data.sections.map((sec, i) => `
                    <a href="${sec.id}.html" class="glass-card p-5 rounded-3xl flex items-center gap-5 w-full active:scale-95 transition-transform" style="animation-delay: ${i * 0.1}s;">
                        <div class="w-16 h-16 shrink-0 bg-brand-light text-brand rounded-2xl flex items-center justify-center shadow-inner">
                            <i class="fa-solid ${sec.icon} text-2xl"></i>
                        </div>
                        <div class="text-right w-full flex justify-between items-center">
                            <h2 class="text-xl font-bold font-lemonada text-gray-800">${sec.title}</h2>
                            <i class="fa-solid fa-angle-left text-gray-300"></i>
                        </div>
                    </a>
                `).join('');
            } catch (e) {
                container.innerHTML = '<p class="text-center font-bold text-gray-500">سيتم تفعيل الأقسام قريباً 🌸</p>';
            }
        }
        window.addEventListener('DOMContentLoaded', loadSections);
    </script>
</body>
</html>
